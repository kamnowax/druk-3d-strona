<main>
    <h1>Kontakt</h1>

    <form id="form">
        <label>Email:</label><br>
        <input type="email" placeholder="Twój email" required><br><br>

        <label>Temat:</label><br>
        <select>
            <option>Zapytanie ofertowe</option>
            <option>Pomoc techniczna</option>
            <option>Inne</option>
        </select><br><br>

        <label>Wiadomość:</label><br>
        <textarea placeholder="Twoja wiadomość" required></textarea><br><br>

        <button type="submit">Wyślij</button>
    </form>
</main>

</footer>
